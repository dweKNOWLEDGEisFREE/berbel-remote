[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DCONFIG_BT_NIMBLE_NVS_PERSIST=1

lib_deps =
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^1.4

[env:esp32s3dev]
extends = common
upload_port = /dev/cu.usbmodem1234561
upload_speed = 460800
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:ota]
extends = common
upload_protocol = espota
upload_port = berbel-remote.local
upload_flags =
    --host_port=3232
    --timeout=60
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
